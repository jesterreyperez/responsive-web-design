<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Survey form for Far Cry 5 game feedback"
    />
    <title>Survey Form</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <!-- HTML structure for the Far Cry 5 feedback survey -->
      <!-- Page Header -->
      <header>
        <h1 id="title">Far Cry 5 Game Feedback Survey</h1>
        <p id="description">
          We would love to hear your thoughts on Far Cry 5. Please complete this
          survey to help improve the game experience.
        </p>
      </header>
      <!-- Survey form starts here -->
      <form id="survey-form">
        <!-- Personal Info -->
        <fieldset>
          <legend>Personal Information</legend>

          <label for="name">Name</label>
          <input type="text" id="name" name="name" required />

          <label for="email">Email</label>
          <input type="email" id="email" name="email" required />

          <label for="age">Age</label>
          <input
            type="number"
            id="age"
            name="age"
            min="18"
            max="100"
            required
          />
        </fieldset>

        <!-- Platform -->
        <fieldset>
          <legend>Platform</legend>

          <label>
            <input type="radio" name="platform" value="pc" />
            PC
          </label>

          <label>
            <input type="radio" name="platform" value="ps4" />
            PS4
          </label>

          <label>
            <input type="radio" name="platform" value="xbox" />
            Xbox
          </label>
        </fieldset>

        <!-- Frequency -->
        <fieldset>
          <legend>Play Frequency</legend>

          <label>
            <input type="radio" name="frequency" value="daily" />
            Daily
          </label>

          <label>
            <input type="radio" name="frequency" value="weekly" />
            Weekly
          </label>

          <label>
            <input type="radio" name="frequency" value="monthly" />
            Monthly
          </label>

          <label>
            <input type="radio" name="frequency" value="rarely" />
            Rarely
          </label>
        </fieldset>

        <!-- Feedback -->
        <fieldset>
          <legend>Feedback</legend>

          <label for="enjoy">What do you enjoy most?</label>
          <input type="text" id="enjoy" name="enjoy" />

          <label for="improvement">What should be improved?</label>
          <textarea id="improvement" name="improvement"></textarea>

          <label for="rating">Recommendation (1–10)</label>
          <select id="rating" name="rating">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
          </select>

          <label for="comments">Additional Comments</label>
          <textarea id="comments" name="comments"></textarea>
        </fieldset>

        <!-- Submit -->
        <button type="submit" id="submit">Submit</button>
      </form>
    </main>
  </body>
</html>
